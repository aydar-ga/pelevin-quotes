# CI for pelevin-quotes (Next.js + Neon + Better Auth).
#
# Two jobs, sequential:
#   1. test  — lint, types, Vitest unit tests, Playwright API E2E (single pipeline)
#   2. build — production `next build` (only after all tests pass)
#
# E2E uses an ephemeral Postgres 16 service container (no Neon secret required).

name: Pelevin-Quotes CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/*"
      - "fix/*"
      - "release/*"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Lint, types, unit & API E2E tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pelevin_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pelevin_ci
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-e2e-32-byte-secret-pad-pad-pad-pad' }}
      RESEND_API_KEY: ""

    steps:
      - name: Checkout — clone the repository at the triggering ref
        uses: actions/checkout@v5

      - name: Node.js 24 — install runtime and cache npm dependencies
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Dependencies — clean install from package-lock.json (npm ci)
        run: npm ci

      - name: ESLint — static analysis for bugs and style violations
        run: npm run lint

      - name: TypeScript — compile check without emitting files (tsc --noEmit)
        run: npm run type-check

      - name: Vitest — unit & component tests in tests/
        run: npm test

      - name: Database — push schema and seed quotes for API E2E
        run: npm run db:push -- --force && npm run db:seed

      - name: Playwright — download Chromium and OS dependencies for headless runs
        run: npx playwright install --with-deps chromium

      - name: Playwright — API smoke, bookmarks, session, and dev-login auth flow
        run: npm run test:e2e
        env:
          CI: "true"
          DEV_TEST_AUTH: "true"
          DEV_TEST_USER_EMAIL: dev@test.local

  build:
    name: Production build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout — clone the repository at the triggering ref
        uses: actions/checkout@v5

      - name: Node.js 24 — install runtime and cache npm dependencies
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Dependencies — clean install from package-lock.json (npm ci)
        run: npm ci

      - name: Next.js build — verify the app compiles for production
        run: npm run build
        env:
          # Placeholder is enough; build does not query the database.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://user:pass@localhost:5432/db?sslmode=require' }}
